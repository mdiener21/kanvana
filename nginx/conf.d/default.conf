server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal resolver — defers upstream DNS lookup to request time
    # so nginx starts cleanly even when pocketbase is absent (standalone mode).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── PocketBase API proxy ──────────────────────────────────────────────────
    location /api/ {
        set $pb http://pocketbase:8090;
        proxy_pass         $pb/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── PocketBase admin UI proxy (locked down by default) ───────────────────
    # Access is denied by default. To enable: add your IP to the allow list,
    # uncomment proxy lines below, and remove the deny all.
    location /_/ {
        # allow 1.2.3.4;  # uncomment and set your admin IP to grant access
        deny all;
        # set $pb http://pocketbase:8090;  # must match $pb in /api/ block
        # proxy_pass         $pb/_/;
        # proxy_set_header   Host $host;
        # proxy_set_header   X-Real-IP $remote_addr;
        # proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static files (SPA fallback) ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    # Repeat security headers: nginx add_header does not inherit when a child
    # location block defines its own add_header directives.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
