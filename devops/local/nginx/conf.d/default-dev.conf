server {
    listen 80;
    server_name _;

    # Docker's internal resolver — defers upstream DNS lookup to request time
    # so nginx starts cleanly even when a service is absent.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── PocketBase API proxy ──────────────────────────────────────────────────
    location /api/ {
        set $pb http://pocketbase:8090;
        proxy_pass         $pb;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── PocketBase admin UI (open in dev) ────────────────────────────────────
    location /_/ {
        set $pb http://pocketbase:8090;
        proxy_pass         $pb;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Vite dev server (HMR WebSocket + all other traffic) ──────────────────
    location / {
        set $fe http://frontend:3000;
        proxy_pass         $fe;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}
