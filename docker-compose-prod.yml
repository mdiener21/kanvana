services:
  nginx:
    build:
      context: .
      target: prod
    image: ghcr.io/mdiener21/kanvana:${IMAGE_TAG:-latest}
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - pocketbase
    restart: unless-stopped

  pocketbase:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8090"
    volumes:
      - pb_data:/pocketbase/data
    restart: unless-stopped

volumes:
  pb_data:
