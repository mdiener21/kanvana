name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Unit and DOM tests
        run: npm run test:unit && npm run test:dom
        working-directory: client

      - name: Install Playwright browser
        run: npx playwright install --with-deps firefox
        working-directory: client

      - name: E2E tests
        run: npm run test:e2e
        working-directory: client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          VITE_PB_URL: ${{ secrets.VITE_PB_URL }}

      - name: Assert build output
        run: |
          [ -f client/dist/index.html ] || (echo "ERROR: client/dist/index.html missing" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 1

  ftp-deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp ca-certificates

      - name: Deploy via lftp
        run: |
          lftp -c "
            set net:max-retries 3;
            set net:timeout 20;
            set ftp:passive-mode true;
            set ssl:verify-certificate false;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data yes;
            open -u ${FTP_USER},${FTP_PASSWORD} -p 21 kanvana.com;
            mirror --reverse --delete --verbose ./dist/ ./public_html/;
            bye;
          "
          # ssl:verify-certificate false — shared hosting FTP cert may be self-signed.
          # Encrypted channel (ftp:ssl-force true) is enforced; only cert validation is skipped.
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

  pages-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'

    concurrency:
      group: pages
      cancel-in-progress: false

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docker-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kanvana:latest
            ghcr.io/${{ github.repository_owner }}/kanvana:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
