name: CI

on:
  push:
    branches: [main]

jobs:
  docker-build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and run npm audit
        run: npm ci && npm audit --audit-level=high

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kanvana:latest
            ghcr.io/${{ github.repository_owner }}/kanvana:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ftp-deploy:
    name: Deploy to kanvana.com via FTP
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          [ -f dist/index.html ] || (echo "ERROR: dist/index.html missing — aborting deploy" && exit 1)

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp ca-certificates

      - name: Deploy via lftp
        run: |
          lftp -c "
            set net:max-retries 3;
            set net:timeout 20;
            set ftp:passive-mode true;
            set ssl:verify-certificate false;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data yes;
            open -u ${FTP_USER},${FTP_PASSWORD} -p 21 kanvana.com;
            mirror --reverse --delete --verbose ./dist/ ./public_html/;
            bye;
          "
          # ssl:verify-certificate false — shared hosting FTP cert may be self-signed or
          # have a hostname mismatch. Encrypted channel (ftp:ssl-force true) is enforced;
          # only certificate validation is skipped. Change to 'yes' if the host cert is valid.
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
