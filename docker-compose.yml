services:
  nginx:
    container_name: nginx
    image: nginx:alpine
    build:
      context: .
      dockerfile: devops/local/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend
      - pocketbase
    restart: unless-stopped

  frontend:
    container_name: frontend
    image: kanvana-frontend-dev
    build:
      context: .
      dockerfile: devops/local/frontend/Dockerfile
    expose:
      - "3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000 --no-open
    restart: unless-stopped

  pocketbase:
    container_name: pb
    build:
      context: .
      dockerfile: devops/local/backend/Dockerfile
    expose:
      - "8090"
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pocketbase/data
    environment:
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@kanvana.local}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-changeme123}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/api/health" ]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  adminer:
    container_name: adminer
    image: adminer:latest
    ports:
      - "8080:8080"
    volumes:
      - pb_data:/pocketbase/data:ro
    environment:
      ADMINER_DEFAULT_SERVER: /pocketbase/data/data.db
    restart: unless-stopped

volumes:
  pb_data:
